plugins {
    id 'java-library'
    id 'net.minecraftforge.gradle' version '[6.0,6.2)'
    id 'idea'
}

version = mod_version
group = mod_group_id

base {
    archivesName = "building-gadgets-extra-forge-${minecraft_version}"
}

java.toolchain.languageVersion = JavaLanguageVersion.of(17)

sourceSets.main.java.srcDir rootProject.file('common/src/main/java')
sourceSets.main.resources.srcDir rootProject.file('common/src/main/resources')
sourceSets.test.java.srcDir rootProject.file('common/src/test/java')
sourceSets.test.java.srcDir rootProject.file('common/src/versionTest/java')

minecraft {
    mappings channel: 'official', version: minecraft_version
    copyIdeResources = true

    runs {
        configureEach {
            workingDirectory project.file('run')
            property 'forge.logging.console.level', 'info'
            property 'mixin.env.remapRefMap', 'true'
            property 'mixin.env.refMapRemappingFile', "${projectDir}/build/createSrgToMcp/output.srg"
            mods {
                "${mod_id}" { source sourceSets.main }
            }
        }
        client {}
        server { args '--nogui' }
    }
}

repositories {
    mavenCentral()
    maven { url = 'https://www.cursemaven.com' }
    maven { url = 'https://repo.spongepowered.org/repository/maven-public/' }
}

dependencies {
    minecraft "net.minecraftforge:forge:${minecraft_version}-${forge_version}"
    implementation fg.deobf('curse.maven:building-gadgets-298187:6850495')
    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'
    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test', Test).configure {
    useJUnitPlatform()
    systemProperty 'bge.moduleDir', projectDir.absolutePath
    systemProperty 'bge.minecraftVersion', minecraft_version
    systemProperty 'bge.loader', 'forge'
    systemProperty 'bge.legacyCut', 'false'
}

tasks.named('processResources', ProcessResources).configure {
    def replacements = [
            minecraft_version_range: minecraft_version_range,
            forge_version_range: forge_version_range,
            loader_version_range: loader_version_range,
            mod_id: mod_id,
            mod_name: mod_name,
            mod_license: mod_license,
            mod_version: mod_version,
            mod_authors: mod_authors,
            mod_description: mod_description,
            mod_url: mod_url,
            mod_issues_url: mod_issues_url,
            building_gadgets_version_range: building_gadgets_version_range
    ]
    inputs.properties replacements
    filesMatching('META-INF/mods.toml') { expand replacements }
}

tasks.named('jar', Jar).configure {
    manifest {
        attributes(
                'MixinConfigs': 'buildinggadgetsextra.mixins.json',
                'Specification-Title': mod_id,
                'Specification-Vendor': mod_authors,
                'Specification-Version': '1',
                'Implementation-Title': project.name,
                'Implementation-Version': archiveVersion,
                'Implementation-Vendor': mod_authors)
    }
    finalizedBy 'reobfJar'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
